<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>@idinsayit — Command Center</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0a0a0a;font-family:'DM Mono',monospace;color:#f0ede6}
  #root{min-height:100%}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── PASSWORD ──────────────────────────────────────────────────────────────────
const CORRECT_PASSWORD = "Qwer8456)";

function LockScreen({ onUnlock }) {
  const [pw, setPw] = useState("");
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);
  const inputRef = useRef();
  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 100); }, []);
  const attempt = () => {
    if (pw === CORRECT_PASSWORD) {
      localStorage.setItem("iis_auth", "1");
      onUnlock();
    } else {
      setError(true);
      setShake(true);
      setPw("");
      setTimeout(() => setShake(false), 500);
    }
  };
  return (
    <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <style>{`
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
        .shake{animation:shake .4s ease}
      `}</style>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:10,fontWeight:700,letterSpacing:".2em",color:"#2a2a2a",textTransform:"uppercase",marginBottom:8}}>@idinsayit</div>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:800,color:"#f0ede6",marginBottom:40}}>Command Center</div>
      <div className={shake?"shake":""} style={{width:"100%",maxWidth:320}}>
        <input
          ref={inputRef}
          type="password"
          value={pw}
          onChange={e=>{setPw(e.target.value);setError(false);}}
          onKeyDown={e=>e.key==="Enter"&&attempt()}
          placeholder="Password"
          style={{width:"100%",background:"#111",border:`1px solid ${error?"#E1306C":"#252525"}`,borderRadius:10,color:"#f0ede6",fontFamily:"'DM Mono',monospace",fontSize:18,padding:"16px 18px",outline:"none",letterSpacing:".08em",marginBottom:10,transition:"border-color .2s"}}
        />
        {error&&<div style={{fontSize:11,color:"#E1306C",letterSpacing:".06em",marginBottom:10}}>Incorrect password</div>}
        <button onClick={attempt} style={{width:"100%",padding:"15px",background:"#f0ede6",color:"#0a0a0a",border:"none",borderRadius:10,fontFamily:"'Syne',sans-serif",fontSize:12,fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",cursor:"pointer"}}>
          Unlock
        </button>
      </div>
    </div>
  );
}

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const TASKS = [
  { id:"ig_note",   group:"Instagram", label:"Note",                   scheduled:"11:00" },
  { id:"ig_story",  group:"Instagram", label:"Story",                  scheduled:"11:00" },
  { id:"ig_post",   group:"Instagram", label:"Post",                   scheduled:"18:00" },
  { id:"ig_boosts", group:"Instagram", label:"Boosts",                 scheduled:"14:30" },
  { id:"th_d1",     group:"Threads",   label:"Daily-1",                scheduled:"09:30" },
  { id:"th_d2",     group:"Threads",   label:"Daily-2",                scheduled:"12:30" },
  { id:"th_d3",     group:"Threads",   label:"Daily-3",                scheduled:"18:30" },
  { id:"th_d4",     group:"Threads",   label:"Daily-4",                scheduled:"21:45" },
  { id:"th_morn",   group:"Threads",   label:"Morning Replies/Quotes", scheduled:"10:00" },
  { id:"th_eve",    group:"Threads",   label:"Evening Replies/Quotes", scheduled:"19:15" },
  { id:"wa_d1",     group:"WhatsApp",  label:"Daily-1",                scheduled:"09:30" },
  { id:"wa_d2",     group:"WhatsApp",  label:"Daily-2",                scheduled:"09:30" },
  { id:"wa_d3",     group:"WhatsApp",  label:"Daily-3",                scheduled:"17:30" },
];
const GROUP_META = {
  Instagram: { icon:"📸", color:"#E1306C" },
  Threads:   { icon:"🧵", color:"#a0a0ff" },
  WhatsApp:  { icon:"💬", color:"#25D366" },
};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const SPEND_TYPES = ["Profile","Engagement","Link Clicks","Website","Other"];

// ── HELPERS ───────────────────────────────────────────────────────────────────
function todayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function nowDate(){return new Date();}
function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function fmtDate(ds){return new Date(ds+"T00:00:00").toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}
function parseScheduled(hhmm){const [h,m]=hhmm.split(":").map(Number);return h*60+m;}
function parseStored(ts){if(!ts)return null;const m=ts.match(/^(\d{1,2}):(\d{2})$/);if(!m)return null;const h=parseInt(m[1]),mn=parseInt(m[2]);return(h<0||h>23||mn<0||mn>59)?null:h*60+mn;}
function parseUserTime(ts){if(!ts)return null;const m=ts.trim().match(/^(\d{1,2}):(\d{2})\s*(am|pm)?$/i);if(!m)return null;let h=parseInt(m[1]),mn=parseInt(m[2]);const mer=m[3]?.toLowerCase();if(mer==="pm"&&h<12)h+=12;if(mer==="am"&&h===12)h=0;return(h<0||h>23||mn<0||mn>59)?null:`${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`;}
function fmt12(hhmm){const [h,m]=hhmm.split(":").map(Number);return `${h%12||12}:${String(m).padStart(2,"0")}${h>=12?"pm":"am"}`;}
function delayLabel(diff){if(diff===null)return null;const abs=Math.abs(diff),h=Math.floor(abs/60),m=abs%60;const lbl=h>0?`${h}h ${m}m`:`${m}m`;if(diff<=0)return{text:`${lbl} early`,color:"#25D366"};if(diff<=15)return{text:"on time",color:"#25D366"};if(diff<=60)return{text:`+${lbl}`,color:"#f7b500"};return{text:`+${lbl}`,color:"#E1306C"};}
function fmtRupee(n){return `₹${Number(n).toLocaleString("en-IN",{minimumFractionDigits:0,maximumFractionDigits:0})}`;}
function churnColor(rate){if(rate<=0.15)return "#25D366";if(rate<=0.30)return "#f7b500";if(rate<=0.50)return "#ff8c00";return "#E1306C";}
function churnLbl(rate){if(rate<=0.15)return "Healthy stickiness";if(rate<=0.30)return "Watch it";if(rate<=0.50)return "Churny acquisition";return "You're leaking badly";}

// ── STORAGE (localStorage only — persistent on Netlify) ───────────────────────
function sGet(key){try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch{return null;}}
function sSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}
function sList(prefix){try{return Object.keys(localStorage).filter(k=>k.startsWith(prefix));}catch{return[];}}

// ── CALC ──────────────────────────────────────────────────────────────────────
function calcTaskStats(days,allData){
  let total=0,done=0,delays=[];
  days.forEach(day=>{const d=allData[day];if(!d)return;TASKS.forEach(t=>{total++;if(d.checked?.[t.id]){done++;const a=parseStored(d.times?.[t.id]);if(a!==null)delays.push(a-parseScheduled(t.scheduled));}});});
  const avgDelay=delays.length?Math.round(delays.reduce((a,b)=>a+b,0)/delays.length):null;
  return{total,done,pct:total?Math.round(done/total*100):0,avgDelay,daysWithData:days.filter(d=>allData[d]).length};
}
function buildTaskReport(label,days,allData){
  const lines=[`📊 idinsayit social report — ${label}\n`];
  const s=calcTaskStats(days,allData);
  lines.push(`Overall: ${s.done}/${s.total} (${s.pct}%)`);
  if(s.avgDelay!==null){const dl=delayLabel(s.avgDelay);lines.push(`Avg delay: ${dl.text}`);}
  lines.push("");
  ["Instagram","Threads","WhatsApp"].forEach(g=>{
    lines.push(`${GROUP_META[g].icon} ${g.toUpperCase()}`);
    TASKS.filter(t=>t.group===g).forEach(task=>{
      let td=0,tt=0,tdl=[];
      days.forEach(day=>{const d=allData[day];if(!d)return;tt++;if(d.checked?.[task.id]){td++;const a=parseStored(d.times?.[task.id]);if(a!==null)tdl.push(a-parseScheduled(task.scheduled));}});
      const p=tt?Math.round(td/tt*100):0;const avgD=tdl.length?Math.round(tdl.reduce((a,b)=>a+b,0)/tdl.length):null;const dl=avgD!==null?delayLabel(avgD):null;
      lines.push(`  ${task.label} (${fmt12(task.scheduled)}): ${td}/${tt} (${p}%)${dl?` · avg ${dl.text}`:""}`);
    });lines.push("");
  });
  lines.push("─── Day by day ───");
  days.forEach(day=>{const d=allData[day];if(!d)return;const dn=TASKS.filter(t=>d.checked?.[t.id]).length;lines.push(`${day}: ${dn}/${TASKS.length} ✅`);});
  return lines.join("\n");
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function Ring({pct,color,size=92,stroke=7,label,sublabel}){
  const r=(size-stroke)/2,circ=2*Math.PI*r,dash=(pct/100)*circ;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)",position:"absolute"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1a1a1a" strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.7s cubic-bezier(.4,0,.2,1)"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:19,color:"#f0ede6"}}>{pct}%</span>
        </div>
      </div>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:10,color:"#666",letterSpacing:".1em",textTransform:"uppercase"}}>{label}</div>
        <div style={{fontSize:10,color:"#333",marginTop:2}}>{sublabel}</div>
      </div>
    </div>
  );
}

function LineChart({series,xLabels,height=160}){
  const W=340,H=height,PAD={t:16,r:12,b:32,l:44};
  const allVals=series.flatMap(s=>s.data.filter(v=>v!==null&&v!==undefined));
  if(allVals.length===0)return <div style={{height:H,display:"flex",alignItems:"center",justifyContent:"center",color:"#2a2a2a",fontSize:11}}>No data yet</div>;
  const minV=Math.min(...allVals),maxV=Math.max(...allVals),range=maxV-minV||1;
  const cx=(i)=>PAD.l+(i/(Math.max(xLabels.length-1,1)))*(W-PAD.l-PAD.r);
  const cy=(v)=>PAD.t+(1-(v-minV)/range)*(H-PAD.t-PAD.b);
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      {Array.from({length:5},(_,i)=>{const v=minV+(i/4)*range,y=cy(v);return <g key={i}><line x1={PAD.l} x2={W-PAD.r} y1={y} y2={y} stroke="#161616" strokeWidth="1"/><text x={PAD.l-6} y={y+4} fill="#2e2e2e" fontSize="9" textAnchor="end">{Math.round(v)}</text></g>;})}
      {xLabels.map((l,i)=><text key={i} x={cx(i)} y={H-PAD.b+14} fill="#2a2a2a" fontSize="8" textAnchor="middle">{l}</text>)}
      {series.map((s,si)=>{
        const pts=s.data.map((v,i)=>v!=null?[cx(i),cy(v)]:null);
        let path="";pts.forEach((pt,i)=>{if(!pt)return;const prev=pts.slice(0,i).reverse().find(Boolean);path+=prev?`L${pt[0]},${pt[1]}`:`M${pt[0]},${pt[1]}`;});
        return <g key={si}><path d={path} fill="none" stroke={s.color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.9"/>{pts.map((pt,i)=>pt&&<circle key={i} cx={pt[0]} cy={pt[1]} r="2.5" fill={s.color} opacity="0.85"/>)}</g>;
      })}
    </svg>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const today=todayKey(), nd=nowDate();
  const [view,setView]=useState("today");
  const [dayData,setDayData]=useState({checked:{},times:{}});
  const [editingTime,setEditingTime]=useState(null);
  const [timeInput,setTimeInput]=useState("");
  const [timeError,setTimeError]=useState("");
  const [animating,setAnimating]=useState({});
  const inputRef=useRef();
  const [allTaskData,setAllTaskData]=useState({});
  const [weekStats,setWeekStats]=useState(null);
  const [monthStats,setMonthStats]=useState(null);
  const [reportMode,setReportMode]=useState("month");
  const [reportYear,setReportYear]=useState(nd.getFullYear());
  const [reportMonth,setReportMonth]=useState(nd.getMonth());
  const [rangeFrom,setRangeFrom]=useState(today);
  const [rangeTo,setRangeTo]=useState(today);
  const [reportStats,setReportStats]=useState(null);
  const [reportDays,setReportDays]=useState([]);
  const [copiedReport,setCopiedReport]=useState(false);
  const [copiedStats,setCopiedStats]=useState(false);
  const [spendEntries,setSpendEntries]=useState([]);
  const [spendForm,setSpendForm]=useState({date:today,amount:"",type:"Profile",note:""});
  const [spendPeriod,setSpendPeriod]=useState("month");
  const [audienceEntries,setAudienceEntries]=useState([]);
  const [audForm,setAudForm]=useState({date:today,followers:"",follows:"",unfollows:""});
  const [saved,setSaved]=useState(false);
  const [showExport,setShowExport]=useState(false);
  const [exportText,setExportText]=useState("");
  const [showImport,setShowImport]=useState(false);
  const [importText,setImportText]=useState("");
  const [importError,setImportError]=useState("");
  const [showTextModal,setShowTextModal]=useState(false);
  const [textModalContent,setTextModalContent]=useState("");

  // ── Load all data on mount
  useEffect(()=>{
    const d=sGet(`idinsayit_${today}`); if(d) setDayData(d);
    const sp=sGet("idinsayit_spend"); if(sp) setSpendEntries(sp);
    const au=sGet("idinsayit_audience"); if(au) setAudienceEntries(au);
  },[]);

  // ── Auto-save on every change
  useEffect(()=>{ sSet(`idinsayit_${today}`,dayData); },[dayData]);
  useEffect(()=>{ sSet("idinsayit_spend",spendEntries); },[spendEntries]);
  useEffect(()=>{ sSet("idinsayit_audience",audienceEntries); },[audienceEntries]);

  // ── Load all task data for stats/reports
  useEffect(()=>{
    if(view==="today")return;
    const keys=sList("idinsayit_").filter(k=>!["idinsayit_spend","idinsayit_audience"].includes(k));
    const data={};
    keys.forEach(k=>{const d=sGet(k);if(d)data[k.replace("idinsayit_","")]=d;});
    data[today]=dayData;
    setAllTaskData(data);
  },[view,dayData]);

  // ── Stats calc
  useEffect(()=>{
    if(view!=="stats"||Object.keys(allTaskData).length===0)return;
    const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(nd);d.setDate(d.getDate()-i);return dateKey(d.getFullYear(),d.getMonth(),d.getDate());});
    const mp=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,"0")}`;
    const monthDays=[...new Set(Object.keys(allTaskData).filter(k=>k.startsWith(mp)))];
    setWeekStats(calcTaskStats(weekDays,allTaskData));
    setMonthStats(calcTaskStats(monthDays,allTaskData));
  },[view,allTaskData]);

  // ── Report calc
  useEffect(()=>{
    if(view!=="reports"||Object.keys(allTaskData).length===0)return;
    let days=[];
    if(reportMode==="month"){const dim=daysInMonth(reportYear,reportMonth);days=Array.from({length:dim},(_,i)=>dateKey(reportYear,reportMonth,i+1));}
    else if(reportMode==="year"){for(let m=0;m<12;m++){const dim=daysInMonth(reportYear,m);for(let d=1;d<=dim;d++)days.push(dateKey(reportYear,m,d));}}
    else{const from=new Date(rangeFrom+"T00:00:00"),to=new Date(rangeTo+"T00:00:00");for(let d=new Date(from);d<=to;d.setDate(d.getDate()+1))days.push(dateKey(d.getFullYear(),d.getMonth(),d.getDate()));}
    setReportDays(days);setReportStats(calcTaskStats(days,allTaskData));
  },[view,allTaskData,reportMode,reportYear,reportMonth,rangeFrom,rangeTo]);

  // ── Actions
  const toggle=(id)=>{
    setAnimating(a=>({...a,[id]:true}));setTimeout(()=>setAnimating(a=>({...a,[id]:false})),350);
    setDayData(d=>{const was=!!d.checked[id];if(!was&&!d.times[id])setTimeout(()=>{setEditingTime(id);setTimeInput("");setTimeError("");},60);return{...d,checked:{...d.checked,[id]:!was}};});
  };
  const openTimeEdit=(e,id)=>{e.stopPropagation();setEditingTime(id);const ex=dayData.times[id];setTimeInput(ex?fmt12(ex):"");setTimeError("");setTimeout(()=>inputRef.current?.focus(),60);};
  const saveTime=(useNow=false)=>{
    if(useNow){const n=new Date();const t=`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;setDayData(d=>({...d,times:{...d.times,[editingTime]:t}}));setEditingTime(null);return;}
    if(!timeInput.trim()){saveTime(true);return;}
    const p=parseUserTime(timeInput);if(!p){setTimeError("Use format like 9:45 or 9:45am");return;}
    setDayData(d=>({...d,times:{...d.times,[editingTime]:p}}));setEditingTime(null);
  };
  const doneCount=TASKS.filter(t=>dayData.checked[t.id]).length;
  const pct=Math.round((doneCount/TASKS.length)*100);

  const doExport=()=>{
    const keys=sList("idinsayit_").filter(k=>!["idinsayit_spend","idinsayit_audience"].includes(k));
    const taskData={};keys.forEach(k=>{const d=sGet(k);if(d)taskData[k]=d;});
    taskData[`idinsayit_${today}`]=dayData;
    const blob={version:1,exported:new Date().toISOString(),taskData,spend:spendEntries,audience:audienceEntries};
    setExportText(JSON.stringify(blob,null,2));setShowExport(true);
  };
  const saveAll=()=>{
    sSet(`idinsayit_${today}`,dayData);sSet("idinsayit_spend",spendEntries);sSet("idinsayit_audience",audienceEntries);
    setSaved(true);setTimeout(()=>setSaved(false),2000);
    doExport();
  };
  const doImport=()=>{
    try{
      const blob=JSON.parse(importText);if(!blob.version)throw new Error();
      if(blob.taskData)Object.entries(blob.taskData).forEach(([k,v])=>sSet(k,v));
      if(blob.taskData&&blob.taskData[`idinsayit_${today}`])setDayData(blob.taskData[`idinsayit_${today}`]);
      if(blob.spend)setSpendEntries(blob.spend);
      if(blob.audience)setAudienceEntries(blob.audience);
      setShowImport(false);setImportText("");setImportError("");
      alert("✅ Data imported!");
    }catch{setImportError("Invalid data — paste the full export text");}
  };
  const showCopy=(text)=>{setTextModalContent(text);setShowTextModal(true);};

  // ── Spend
  const addSpend=()=>{
    if(!spendForm.amount||isNaN(Number(spendForm.amount)))return;
    const entry={id:Date.now(),date:spendForm.date,amount:Number(spendForm.amount),type:spendForm.type,note:spendForm.note};
    setSpendEntries(e=>[...e,entry].sort((a,b)=>a.date.localeCompare(b.date)));
    setSpendForm(f=>({...f,amount:"",note:""}));
  };
  const spendForPeriod=(p)=>{const now=new Date();return spendEntries.filter(e=>{const d=new Date(e.date+"T00:00:00");if(p==="week"){const w=new Date(now);w.setDate(w.getDate()-6);return d>=w;}if(p==="month")return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();if(p==="year")return d.getFullYear()===now.getFullYear();return true;});};
  const spendTotal=(e)=>e.reduce((s,x)=>s+x.amount,0);
  const spendByType=(e)=>{const m={};e.forEach(x=>{m[x.type]=(m[x.type]||0)+x.amount;});return m;};
  const buildSpendSummary=()=>{
    const e=spendForPeriod(spendPeriod);
    const label=spendPeriod==="week"?"Last 7 days":spendPeriod==="month"?"This month":spendPeriod==="year"?"This year":"All time";
    const lines=[`💰 idinsayit spend — ${label}\n`,`Total: ${fmtRupee(spendTotal(e))}\n`];
    const bt=spendByType(e);SPEND_TYPES.filter(t=>bt[t]).forEach(t=>lines.push(`  ${t}: ${fmtRupee(bt[t])}`));
    lines.push("\n─── Entries ───");e.forEach(x=>lines.push(`${x.date} · ${x.type}${x.note?` (${x.note})`:""} · ${fmtRupee(x.amount)}`));
    return lines.join("\n");
  };

  // ── Audience
  const addAudience=()=>{
    if(!audForm.followers)return;
    const entry={id:Date.now(),date:audForm.date,followers:Number(audForm.followers),follows:Number(audForm.follows)||0,unfollows:Number(audForm.unfollows)||0};
    setAudienceEntries(e=>{const f=e.filter(x=>x.date!==entry.date);return[...f,entry].sort((a,b)=>a.date.localeCompare(b.date));});
    setAudForm(f=>({...f,followers:"",follows:"",unfollows:""}));
  };
  const currentMonthAud=audienceEntries.filter(e=>{const d=new Date(e.date+"T00:00:00");return d.getFullYear()===nd.getFullYear()&&d.getMonth()===nd.getMonth();});
  const totalFollows=currentMonthAud.reduce((s,e)=>s+e.follows,0);
  const totalUnfollows=currentMonthAud.reduce((s,e)=>s+e.unfollows,0);
  const monthChurn=totalFollows>0?Math.round((totalUnfollows/totalFollows)*100)/100:null;
  const audLast30=audienceEntries.filter(e=>{const d=new Date(e.date+"T00:00:00"),w=new Date();w.setDate(w.getDate()-29);return d>=w;});
  const audChurnRates=audLast30.map(e=>e.follows>0?Math.round((e.unfollows/e.follows)*100)/100:null);
  const buildAudSummary=()=>{
    const lines=[`📈 idinsayit audience — ${MONTHS[nd.getMonth()]} ${nd.getFullYear()}\n`];
    if(audienceEntries.length>0){const last=audienceEntries[audienceEntries.length-1];lines.push(`Latest: ${last.followers.toLocaleString("en-IN")} (${last.date})`);}
    lines.push(`Month follows: ${totalFollows} · Unfollows: ${totalUnfollows}`);
    if(monthChurn!==null)lines.push(`Churn: ${monthChurn} — ${churnLbl(monthChurn)}`);
    lines.push("\n─── Daily log ───");
    currentMonthAud.forEach(e=>{const cr=e.follows>0?(e.unfollows/e.follows).toFixed(2):"-";lines.push(`${e.date} · 👥 ${e.followers.toLocaleString("en-IN")} · +${e.follows} / -${e.unfollows} · churn ${cr}`);});
    return lines.join("\n");
  };
  const buildDailySummary=()=>{
    const lines=[`📅 ${fmtDate(today)} — idinsayit\n`];
    ["Instagram","Threads","WhatsApp"].forEach(g=>{
      lines.push(`${GROUP_META[g].icon} ${g.toUpperCase()}`);
      TASKS.filter(t=>t.group===g).forEach(t=>{const done=dayData.checked[t.id],ts=dayData.times[t.id];const a=parseStored(ts),diff=a!==null?a-parseScheduled(t.scheduled):null,dl=delayLabel(diff);lines.push(`  ${done?"✅":"❌"} ${t.label} — ${fmt12(t.scheduled)}${ts?` @ ${fmt12(ts)}`:""}${dl?` (${dl.text})`:""}`);});lines.push("");
    });return lines.join("\n");
  };

  const availableYears=[...new Set([...Object.keys(allTaskData).map(k=>parseInt(k.split("-")[0])).filter(Boolean),nd.getFullYear()])].sort((a,b)=>b-a);
  const reportLabel=()=>{if(reportMode==="month")return `${MONTHS[reportMonth]} ${reportYear}`;if(reportMode==="year")return `${reportYear}`;return `${rangeFrom} → ${rangeTo}`;};
  const editingTask=TASKS.find(t=>t.id===editingTime);

  const CSS=`
    *{box-sizing:border-box;margin:0;padding:0}
    .hdr{padding:24px 20px 14px;border-bottom:1px solid #161616;position:sticky;top:0;z-index:10;background:#0a0a0a}
    .handle{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.18em;color:#3a3a3a;text-transform:uppercase;margin-bottom:3px}
    .title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#f0ede6;line-height:1;margin-bottom:11px}
    .tabs{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
    .tab{padding:5px 11px;border-radius:20px;font-size:9px;letter-spacing:.08em;cursor:pointer;border:1px solid #1e1e1e;background:transparent;color:#3a3a3a;font-family:'DM Mono',monospace;transition:all .2s;white-space:nowrap}
    .tab.active{background:#f0ede6;color:#0a0a0a;border-color:#f0ede6}
    .hdr-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
    .prog-track{height:2px;background:#161616;border-radius:2px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,#E1306C,#f7b500);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
    .prog-label{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:#383838;letter-spacing:.07em}
    .date-strip{font-size:10px;letter-spacing:.1em;color:#252525;text-transform:uppercase;padding:9px 20px;border-bottom:1px solid #101010}
    .gsec{border-bottom:1px solid #101010}
    .ghdr{display:flex;align-items:center;gap:7px;padding:12px 20px 5px}
    .gdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .gname{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#555}
    .trow{display:flex;align-items:center;justify-content:space-between;padding:9px 20px;cursor:pointer;transition:background .15s;gap:8px}
    .trow:hover{background:#0e0e0e}
    .tleft{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
    .chk{width:17px;height:17px;border-radius:4px;border:1.5px solid #252525;display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.4,0,.2,1);flex-shrink:0}
    .chk.on{border-color:transparent}
    .ckm{font-size:10px;transition:transform .25s cubic-bezier(.34,1.56,.64,1);transform:scale(0)}
    .chk.on .ckm{transform:scale(1)}
    .tlbl{font-size:12px;letter-spacing:.02em;transition:opacity .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tlbl.done{opacity:.25;text-decoration:line-through;text-decoration-color:#2a2a2a}
    .tright{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
    .sched{font-size:10px;color:#252525;letter-spacing:.04em}
    .actual{font-size:10px;letter-spacing:.04em;cursor:pointer;padding:2px 6px;border-radius:3px;border:1px solid #1a1a1a;color:#555;transition:border-color .15s}
    .actual:hover{border-color:#2e2e2e}
    .dtag{font-size:9px;letter-spacing:.06em}
    .footer{padding:14px 20px;display:flex;gap:8px;position:sticky;bottom:0;background:#0a0a0a;border-top:1px solid #161616}
    .bcopy{flex:1;padding:11px;background:#f0ede6;color:#0a0a0a;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
    .bcopy:hover{opacity:.85}
    .breset{padding:11px 14px;background:transparent;color:#252525;border:1px solid #161616;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer}
    .mov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;justify-content:center}
    .mod{background:#111;border-top:1px solid #1e1e1e;padding:24px 20px 36px;width:100%;max-width:480px;border-radius:16px 16px 0 0;max-height:85vh;display:flex;flex-direction:column}
    .mt{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:3px}
    .ms{font-size:11px;color:#3a3a3a;margin-bottom:14px;letter-spacing:.04em}
    .ti{width:100%;background:#0a0a0a;border:1px solid #252525;border-radius:8px;color:#f0ede6;font-family:'DM Mono',monospace;font-size:22px;padding:12px 14px;outline:none;letter-spacing:.1em}
    .ti:focus{border-color:#3a3a3a}
    .terr{font-size:11px;color:#E1306C;margin-top:6px;letter-spacing:.04em}
    .mbtns{display:flex;gap:8px;margin-top:12px}
    .bnow{flex:1;padding:12px;background:#f0ede6;color:#0a0a0a;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;cursor:pointer}
    .bsave{flex:1;padding:12px;background:#1e1e1e;color:#f0ede6;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;cursor:pointer}
    .bcancel{padding:12px 14px;background:transparent;color:#2d2d2d;border:1px solid #1a1a1a;border-radius:8px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer}
    .pulse{animation:pulse .35s ease}
    @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
    .pad{padding:20px}
    .sh{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#383838;margin-bottom:12px}
    .rings{display:flex;justify-content:space-around;margin-bottom:22px;padding:18px 8px;background:#0d0d0d;border-radius:12px;border:1px solid #131313}
    .drow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #0f0f0f}
    .bkdown{margin-top:18px;padding:10px 14px;background:#0d0d0d;border-radius:10px;border:1px solid #131313}
    .bkrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #0f0f0f;font-size:11px}
    .bkrow:last-child{border-bottom:none}
    .seg{display:flex;gap:3px;background:#0d0d0d;padding:3px;border-radius:8px;border:1px solid #131313;margin-bottom:16px}
    .seg-btn{flex:1;padding:7px;border:none;border-radius:5px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;cursor:pointer;background:transparent;color:#444;transition:all .2s}
    .seg-btn.active{background:#1e1e1e;color:#f0ede6}
    .sel{background:#0d0d0d;border:1px solid #1a1a1a;color:#f0ede6;font-family:'DM Mono',monospace;font-size:11px;padding:7px 9px;border-radius:6px;outline:none;cursor:pointer}
    .selrow{display:flex;gap:7px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
    .rinput{background:#0d0d0d;border:1px solid #1a1a1a;color:#f0ede6;font-family:'DM Mono',monospace;font-size:11px;padding:7px 9px;border-radius:6px;outline:none;flex:1}
    .rsc{background:#0d0d0d;border:1px solid #131313;border-radius:12px;padding:14px;margin-bottom:12px}
    .big-pct{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;line-height:1}
    .trrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #0f0f0f;font-size:11px}
    .trrow:last-child{border-bottom:none}
    .mbt{height:3px;background:#1a1a1a;border-radius:2px;margin-top:3px}
    .crbtn{width:100%;padding:13px;background:#f0ede6;color:#0a0a0a;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;margin-top:16px}
    .crbtn:hover{opacity:.85}
    select option{background:#111;color:#f0ede6}
    .finput{background:#0d0d0d;border:1px solid #1a1a1a;color:#f0ede6;font-family:'DM Mono',monospace;font-size:12px;padding:8px 10px;border-radius:6px;outline:none;width:100%}
    .finput:focus{border-color:#333}
    .frow{display:grid;gap:8px;margin-bottom:8px}
    .fsel{background:#0d0d0d;border:1px solid #1a1a1a;color:#f0ede6;font-family:'DM Mono',monospace;font-size:12px;padding:8px 10px;border-radius:6px;outline:none;width:100%}
    .badd{width:100%;padding:10px;background:#f0ede6;color:#0a0a0a;border:none;border-radius:7px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;cursor:pointer;margin-top:6px}
    .entry-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #0f0f0f;gap:8px}
    .entry-row:last-child{border-bottom:none}
    .del-btn{background:transparent;border:none;color:#2a2a2a;cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0}
    .del-btn:hover{color:#E1306C}
    .chart-box{background:#0d0d0d;border:1px solid #131313;border-radius:10px;padding:12px;margin-bottom:14px;overflow:hidden}
    .legend-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
    .leg-item{display:flex;align-items:center;gap:5px;font-size:9px;color:#555;letter-spacing:.05em}
    .legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .churn-band{height:8px;border-radius:4px;overflow:hidden;display:flex;margin:8px 0 6px}
    .aud-stat-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #0f0f0f}
    .aud-stat-row:last-child{border-bottom:none}
    .hdr-btns{display:flex;gap:5px}
    .hbtn{padding:4px 10px;background:transparent;border:1px solid #1e1e1e;border-radius:6px;color:#444;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;cursor:pointer;transition:all .2s}
    .hbtn:hover{border-color:#333;color:#888}
    .hbtn.saved{background:#25D366;border-color:#25D366;color:#0a0a0a}
  `;

  return (
    <div style={{minHeight:"100vh",background:"#0a0a0a",fontFamily:"'DM Mono',monospace",color:"#f0ede6",maxWidth:480,margin:"0 auto"}}>
      <style>{CSS}</style>

      {/* HEADER */}
      <div className="hdr">
        <div className="handle">@idinsayit</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div className="title">Command Center</div>
          <div className="hdr-btns">
            <button className={`hbtn${saved?" saved":""}`} onClick={saveAll}>{saved?"✓ Saved":"Save"}</button>
            <button className="hbtn" onClick={doExport}>Export</button>
            <button className="hbtn" onClick={()=>{setShowImport(true);setImportText("");setImportError("");}}>Import</button>
          </div>
        </div>
        <div className="tabs">
          {[["today","Today"],["stats","Stats"],["reports","Reports"],["spend","Spend"],["audience","Audience"]].map(([v,l])=>(
            <button key={v} className={`tab ${view===v?"active":""}`} onClick={()=>setView(v)}>{l}</button>
          ))}
        </div>
        {view==="today"&&<>
          <div className="prog-track"><div className="prog-fill" style={{width:`${pct}%`}}/></div>
          <div className="prog-label"><span>{doneCount} of {TASKS.length} done</span><span>{pct}%</span></div>
        </>}
      </div>

      {/* TODAY */}
      {view==="today"&&<>
        <div className="date-strip">{fmtDate(today)}</div>
        {["Instagram","Threads","WhatsApp"].map(group=>{
          const meta=GROUP_META[group];
          return(
            <div className="gsec" key={group}>
              <div className="ghdr"><div className="gdot" style={{background:meta.color}}/><span className="gname">{meta.icon} {group}</span></div>
              {TASKS.filter(t=>t.group===group).map(task=>{
                const done=!!dayData.checked[task.id],ts=dayData.times[task.id];
                const a=parseStored(ts),diff=a!==null?a-parseScheduled(task.scheduled):null,dl=delayLabel(diff);
                return(
                  <div key={task.id} className={`trow ${animating[task.id]?"pulse":""}`} onClick={()=>toggle(task.id)}>
                    <div className="tleft">
                      <div className={`chk ${done?"on":""}`} style={done?{background:meta.color}:{}}><span className="ckm">✓</span></div>
                      <span className={`tlbl ${done?"done":""}`}>{task.label}</span>
                    </div>
                    <div className="tright">
                      <span className="sched">{fmt12(task.scheduled)}</span>
                      {done&&<span className="actual" onClick={e=>openTimeEdit(e,task.id)}>{ts?fmt12(ts):"+ log time"}</span>}
                      {dl&&<span className="dtag" style={{color:dl.color}}>{dl.text}</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
        <div className="footer">
          <button className="bcopy" onClick={()=>showCopy(buildDailySummary())}>Copy Summary</button>
          <button className="breset" onClick={()=>{if(confirm("Reset today?"))setDayData({checked:{},times:{}});}}>Reset</button>
        </div>
      </>}

      {/* STATS */}
      {view==="stats"&&(()=>{
        const momMonths=Array.from({length:6},(_,i)=>{const d=new Date(nd.getFullYear(),nd.getMonth()-i,1);return{year:d.getFullYear(),month:d.getMonth(),label:MONTHS[d.getMonth()]};}).reverse();
        const momPct=momMonths.map(({year,month})=>{const prefix=`${year}-${String(month+1).padStart(2,"0")}`;const days=Object.keys(allTaskData).filter(k=>k.startsWith(prefix));if(!days.length)return null;return calcTaskStats(days,allTaskData).pct;});
        const momDelay=momMonths.map(({year,month})=>{const prefix=`${year}-${String(month+1).padStart(2,"0")}`;const days=Object.keys(allTaskData).filter(k=>k.startsWith(prefix));if(!days.length)return null;return calcTaskStats(days,allTaskData).avgDelay;});
        const yrData=[nd.getFullYear()-1,nd.getFullYear()].map(yr=>({year:yr,pcts:Array.from({length:12},(_,m)=>{const prefix=`${yr}-${String(m+1).padStart(2,"0")}`;const days=Object.keys(allTaskData).filter(k=>k.startsWith(prefix));return days.length?calcTaskStats(days,allTaskData).pct:null;}),delays:Array.from({length:12},(_,m)=>{const prefix=`${yr}-${String(m+1).padStart(2,"0")}`;const days=Object.keys(allTaskData).filter(k=>k.startsWith(prefix));return days.length?calcTaskStats(days,allTaskData).avgDelay:null;})}));
        const buildStatsSummary=()=>{const lines=[`📊 idinsayit stats\n`];lines.push(`Week: ${weekStats?.done??0}/${weekStats?.total??0} (${weekStats?.pct??0}%)`);if(weekStats?.avgDelay!=null){const dl=delayLabel(weekStats.avgDelay);lines.push(`Week avg delay: ${dl.text}`);}lines.push(`Month: ${monthStats?.done??0}/${monthStats?.total??0} (${monthStats?.pct??0}%)`);if(monthStats?.avgDelay!=null){const dl=delayLabel(monthStats.avgDelay);lines.push(`Month avg delay: ${dl.text}`);}lines.push("\n─── Month on Month ───");momMonths.forEach(({label,year},i)=>{const p=momPct[i],d=momDelay[i];const dl=d!=null?delayLabel(d):null;lines.push(`${label} ${year}: ${p!=null?p+"%":"no data"}${dl?` · avg delay ${dl.text}`:""}`);});return lines.join("\n");};
        return(
          <div className="pad">
            <div className="sh">Progress</div>
            <div className="rings">
              <Ring pct={weekStats?.pct??0} color="#E1306C" size={85} stroke={7} label="This Week" sublabel={`${weekStats?.done??0}/${weekStats?.total??0}`}/>
              <Ring pct={monthStats?.pct??0} color="#f7b500" size={85} stroke={7} label="This Month" sublabel={`${monthStats?.done??0}/${monthStats?.total??0}`}/>
            </div>
            <div className="sh">Average Delay</div>
            {[{label:"This week",val:weekStats?.avgDelay??null},{label:"This month",val:monthStats?.avgDelay??null}].map(row=>{const dl=row.val!==null?delayLabel(row.val):null;return(<div className="drow" key={row.label}><span style={{fontSize:12,color:"#555"}}>{row.label}</span>{dl?<span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:dl.color}}>{dl.text}</span>:<span style={{fontSize:11,color:"#252525"}}>log times to see</span>}</div>);})}
            <div className="sh" style={{marginTop:20}}>Month on Month — Completion %</div>
            <div className="chart-box"><LineChart series={[{data:momPct,color:"#f7b500"}]} xLabels={momMonths.map(m=>m.label)} height={110}/></div>
            <div className="sh">Month on Month — Avg Delay (mins)</div>
            <div className="chart-box"><LineChart series={[{data:momDelay,color:"#a0a0ff"}]} xLabels={momMonths.map(m=>m.label)} height={110}/><div style={{fontSize:9,color:"#2e2e2e",marginTop:4,letterSpacing:".05em"}}>negative = early · positive = late</div></div>
            <div className="sh">Year on Year — Completion %</div>
            <div className="chart-box"><LineChart series={yrData.map((yr,i)=>({data:yr.pcts,color:i===0?"#333":"#f7b500"}))} xLabels={MONTHS} height={110}/><div className="legend-row">{yrData.map((yr,i)=><div className="leg-item" key={yr.year}><div className="legend-dot" style={{background:i===0?"#444":"#f7b500"}}/><span>{yr.year}</span></div>)}</div></div>
            <div className="sh">Year on Year — Avg Delay (mins)</div>
            <div className="chart-box"><LineChart series={yrData.map((yr,i)=>({data:yr.delays,color:i===0?"#333":"#a0a0ff"}))} xLabels={MONTHS} height={110}/><div className="legend-row">{yrData.map((yr,i)=><div className="leg-item" key={yr.year}><div className="legend-dot" style={{background:i===0?"#444":"#a0a0ff"}}/><span>{yr.year}</span></div>)}</div></div>
            <div className="bkdown" style={{marginTop:4}}>
              <div style={{fontSize:10,color:"#2e2e2e",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>Today</div>
              {TASKS.map(task=>{const done=!!dayData.checked[task.id],ts=dayData.times[task.id];const a=parseStored(ts),diff=a!==null?a-parseScheduled(task.scheduled):null,dl=delayLabel(diff);return(<div className="bkrow" key={task.id}><span style={{color:done?"#555":"#222",display:"flex",gap:6,alignItems:"center"}}><span>{done?"✅":"⬜"}</span><span>{GROUP_META[task.group].icon} {task.label}</span></span><span style={{color:dl?.color??"#222"}}>{ts?`${fmt12(ts)}${dl?` · ${dl.text}`:""}`:"-"}</span></div>);})}
            </div>
            <button className="crbtn" onClick={()=>showCopy(buildStatsSummary())}>{copiedStats?"✓":"Share Stats"}</button>
          </div>
        );
      })()}

      {/* REPORTS */}
      {view==="reports"&&(
        <div className="pad">
          <div className="sh">Reports</div>
          <div className="seg">{["month","year","range"].map(m=><button key={m} className={`seg-btn ${reportMode===m?"active":""}`} onClick={()=>setReportMode(m)}>{m==="month"?"Month":m==="year"?"Year":"Custom"}</button>)}</div>
          {reportMode==="month"&&<div className="selrow"><select className="sel" value={reportMonth} onChange={e=>setReportMonth(Number(e.target.value))}>{MONTHS.map((mn,i)=><option key={i} value={i}>{mn}</option>)}</select><select className="sel" value={reportYear} onChange={e=>setReportYear(Number(e.target.value))}>{availableYears.map(y=><option key={y} value={y}>{y}</option>)}</select></div>}
          {reportMode==="year"&&<div className="selrow"><select className="sel" value={reportYear} onChange={e=>setReportYear(Number(e.target.value))}>{availableYears.map(y=><option key={y} value={y}>{y}</option>)}</select></div>}
          {reportMode==="range"&&<div className="selrow"><input type="date" className="rinput" value={rangeFrom} onChange={e=>setRangeFrom(e.target.value)}/><span style={{color:"#333",fontSize:11}}>→</span><input type="date" className="rinput" value={rangeTo} onChange={e=>setRangeTo(e.target.value)}/></div>}
          {reportStats&&<>
            <div className="rsc">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div><div style={{fontSize:10,color:"#444",letterSpacing:".12em",textTransform:"uppercase",marginBottom:4}}>{reportLabel()}</div><div className="big-pct" style={{color:reportStats.pct>=80?"#25D366":reportStats.pct>=50?"#f7b500":"#E1306C"}}>{reportStats.pct}%</div><div style={{fontSize:11,color:"#444",marginTop:3}}>{reportStats.done}/{reportStats.total} · {reportStats.daysWithData} days</div></div>
                {reportStats.avgDelay!==null&&(()=>{const dl=delayLabel(reportStats.avgDelay);return(<div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#333",letterSpacing:".1em",textTransform:"uppercase",marginBottom:2}}>Avg delay</div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:dl.color}}>{dl.text}</div></div>);})()}
              </div>
            </div>
            {["Instagram","Threads","WhatsApp"].map(group=>{const meta=GROUP_META[group];return(<div key={group} style={{marginBottom:12}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}><div style={{width:5,height:5,borderRadius:"50%",background:meta.color}}/><span style={{fontFamily:"'Syne',sans-serif",fontSize:10,fontWeight:700,letterSpacing:".14em",textTransform:"uppercase",color:"#444"}}>{meta.icon} {group}</span></div><div style={{background:"#0d0d0d",border:"1px solid #131313",borderRadius:10,padding:"4px 12px"}}>{TASKS.filter(t=>t.group===group).map(task=>{let td=0,tt=0,tdl=[];reportDays.forEach(day=>{const d=allTaskData[day];if(!d)return;tt++;if(d.checked?.[task.id]){td++;const a=parseStored(d.times?.[task.id]);if(a!==null)tdl.push(a-parseScheduled(task.scheduled));}});const tpct=tt?Math.round(td/tt*100):0;const avgD=tdl.length?Math.round(tdl.reduce((a,b)=>a+b,0)/tdl.length):null;const dl=avgD!==null?delayLabel(avgD):null;return(<div className="trrow" key={task.id}><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#666"}}>{task.label}</span><span style={{color:tpct>=80?"#25D366":tpct>=50?"#f7b500":"#555",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:11}}>{tpct}%</span></div><div className="mbt"><div style={{height:3,width:`${tpct}%`,background:meta.color,borderRadius:2,transition:"width .5s"}}/></div>{dl&&<div style={{fontSize:9,color:dl.color,marginTop:2,letterSpacing:".05em"}}>avg {dl.text}</div>}</div></div>);})}</div></div>);})}
            <button className="crbtn" onClick={()=>showCopy(buildTaskReport(reportLabel(),reportDays,allTaskData))}>{copiedReport?"✓":` Copy ${reportLabel()} Report`}</button>
          </>}
        </div>
      )}

      {/* SPEND */}
      {view==="spend"&&(
        <div className="pad">
          <div className="sh">Ad Spend</div>
          <div style={{background:"#0d0d0d",border:"1px solid #131313",borderRadius:10,padding:14,marginBottom:16}}>
            <div className="frow" style={{gridTemplateColumns:"1fr 1fr"}}><input type="date" className="finput" value={spendForm.date} onChange={e=>setSpendForm(f=>({...f,date:e.target.value}))}/><input type="number" className="finput" placeholder="Amount ₹" value={spendForm.amount} onChange={e=>setSpendForm(f=>({...f,amount:e.target.value}))}/></div>
            <div className="frow" style={{gridTemplateColumns:"1fr 1fr"}}><select className="fsel" value={spendForm.type} onChange={e=>setSpendForm(f=>({...f,type:e.target.value}))}>{SPEND_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select>{spendForm.type==="Other"&&<input className="finput" placeholder="Describe…" value={spendForm.note} onChange={e=>setSpendForm(f=>({...f,note:e.target.value}))}/>}</div>
            <button className="badd" onClick={addSpend}>+ Add Entry</button>
          </div>
          <div className="seg">{["week","month","year","all"].map(p=><button key={p} className={`seg-btn ${spendPeriod===p?"active":""}`} onClick={()=>setSpendPeriod(p)}>{p==="week"?"7d":p==="month"?"Month":p==="year"?"Year":"All"}</button>)}</div>
          {(()=>{const entries=spendForPeriod(spendPeriod);const total=spendTotal(entries);const byType=spendByType(entries);const label=spendPeriod==="week"?"Last 7 days":spendPeriod==="month"?"This month":spendPeriod==="year"?"This year":"All time";const colors={"Profile":"#E1306C","Engagement":"#a0a0ff","Link Clicks":"#f7b500","Website":"#25D366","Other":"#888"};return(<div style={{background:"#0d0d0d",border:"1px solid #131313",borderRadius:10,padding:14,marginBottom:16}}><div style={{fontSize:10,color:"#444",letterSpacing:".12em",textTransform:"uppercase",marginBottom:5}}>{label}</div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:32,color:"#f0ede6",marginBottom:10}}>{fmtRupee(total)}</div>{SPEND_TYPES.filter(t=>byType[t]).map(t=>{const p=total>0?Math.round(byType[t]/total*100):0;return(<div key={t} style={{marginBottom:5}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}><span style={{color:"#555"}}>{t}</span><span style={{color:"#888"}}>{fmtRupee(byType[t])} ({p}%)</span></div><div style={{height:2,background:"#1a1a1a",borderRadius:2}}><div style={{height:2,width:`${p}%`,background:colors[t]||"#888",borderRadius:2}}/></div></div>);})}</div>);})()}
          {spendEntries.length>0&&<div style={{background:"#0d0d0d",border:"1px solid #131313",borderRadius:10,padding:"4px 14px",marginBottom:16}}><div style={{fontSize:10,color:"#2e2e2e",letterSpacing:".1em",textTransform:"uppercase",padding:"7px 0 3px"}}>All entries</div>{[...spendEntries].reverse().map(e=>{const colors={"Profile":"#E1306C","Engagement":"#a0a0ff","Link Clicks":"#f7b500","Website":"#25D366","Other":"#888"};return(<div className="entry-row" key={e.id}><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:1}}><span style={{width:5,height:5,borderRadius:"50%",background:colors[e.type]||"#888",flexShrink:0,display:"inline-block"}}/><span style={{fontSize:11,color:"#777"}}>{e.type}{e.note?` · ${e.note}`:""}</span></div><div style={{fontSize:10,color:"#333"}}>{e.date}</div></div><span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,color:"#f0ede6"}}>{fmtRupee(e.amount)}</span><button className="del-btn" onClick={()=>setSpendEntries(x=>x.filter(s=>s.id!==e.id))}>×</button></div>);})}</div>}
          <button className="crbtn" onClick={()=>showCopy(buildSpendSummary())}>Copy Spend Summary</button>
        </div>
      )}

      {/* AUDIENCE */}
      {view==="audience"&&(
        <div className="pad">
          <div className="sh">Audience</div>
          <div style={{background:"#0d0d0d",border:"1px solid #131313",borderRadius:10,padding:14,marginBottom:16}}>
            <div className="frow"><input type="date" className="finput" value={audForm.date} onChange={e=>setAudForm(f=>({...f,date:e.target.value}))}/></div>
            <div className="frow" style={{gridTemplateColumns:"1fr 1fr 1fr"}}><input type="number" className="finput" placeholder="Followers" value={audForm.followers} onChange={e=>setAudForm(f=>({...f,followers:e.target.value}))}/><input type="number" className="finput" placeholder="Follows" value={audForm.follows} onChange={e=>setAudForm(f=>({...f,follows:e.target.value}))}/><input type="number" className="finput" placeholder="Unfollow" value={audForm.unfollows} onChange={e=>setAudForm(f=>({...f,unfollows:e.target.value}))}/></div>
            <button className="badd" onClick={addAudience}>+ Log Day</button>
          </div>
          {monthChurn!==null&&(()=>{const color=churnColor(monthChurn);const label=churnLbl(monthChurn);const pos=Math.min(monthChurn/0.6,1)*100;return(<div style={{background:"#0d0d0d",border:"1px solid #131313",borderRadius:10,padding:14,marginBottom:14}}><div style={{fontSize:10,color:"#444",letterSpacing:".12em",textTransform:"uppercase",marginBottom:8}}>Churn rate — {MONTHS[nd.getMonth()]}</div><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}><span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:26,color}}>{monthChurn.toFixed(2)}</span><span style={{fontSize:11,color,letterSpacing:".05em"}}>{label}</span></div><div style={{position:"relative",marginBottom:4}}><div className="churn-band"><div style={{flex:15,background:"#25D366",opacity:.7}}/><div style={{flex:15,background:"#a0c040",opacity:.7}}/><div style={{flex:20,background:"#f7b500",opacity:.7}}/><div style={{flex:20,background:"#ff8c00",opacity:.7}}/><div style={{flex:30,background:"#E1306C",opacity:.7}}/></div><div style={{position:"absolute",top:-3,left:`calc(${pos}% - 5px)`,width:10,height:14,background:"#f0ede6",borderRadius:2,transition:"left .4s"}}/></div><div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:"#2a2a2a"}}><span>0</span><span>0.15</span><span>0.30</span><span>0.50</span><span>0.60+</span></div></div>);})()}
          {audLast30.length>=2&&<><div className="chart-box"><div style={{fontSize:10,color:"#444",letterSpacing:".1em",textTransform:"uppercase",marginBottom:5}}>Followers — last 30 days</div><LineChart series={[{data:audLast30.map(e=>e.followers),color:"#f7b500"}]} xLabels={audLast30.map(e=>e.date.slice(5))} height={120}/></div><div className="chart-box"><div style={{fontSize:10,color:"#444",letterSpacing:".1em",textTransform:"uppercase",marginBottom:5}}>Follows / Unfollows / Churn×100</div><LineChart series={[{data:audLast30.map(e=>e.follows),color:"#25D366"},{data:audLast30.map(e=>e.unfollows),color:"#E1306C"},{data:audChurnRates.map(r=>r!==null?Math.round(r*100):null),color:"#a0a0ff"}]} xLabels={audLast30.map(e=>e.date.slice(5))} height={120}/><div className="legend-row">{[["#25D366","Follows"],["#E1306C","Unfollows"],["#a0a0ff","Churn×100"]].map(([c,l])=><div className="leg-item" key={l}><div className="legend-dot" style={{background:c}}/><span>{l}</span></div>)}</div></div></>}
          {(()=>{
            const momAud=Array.from({length:6},(_,i)=>{const d=new Date(nd.getFullYear(),nd.getMonth()-i,1);return{year:d.getFullYear(),month:d.getMonth(),label:MONTHS[d.getMonth()]};}).reverse();
            const getM=(y,m)=>audienceEntries.filter(e=>{const d=new Date(e.date+"T00:00:00");return d.getFullYear()===y&&d.getMonth()===m;});
            const momFollowerEnd=momAud.map(({year,month})=>{const e=getM(year,month);return e.length?e[e.length-1].followers:null;});
            const momNet=momAud.map(({year,month})=>{const e=getM(year,month);if(!e.length)return null;return e.reduce((s,x)=>s+x.follows,0)-e.reduce((s,x)=>s+x.unfollows,0);});
            const momCR=momAud.map(({year,month})=>{const e=getM(year,month);if(!e.length)return null;const f=e.reduce((s,x)=>s+x.follows,0),u=e.reduce((s,x)=>s+x.unfollows,0);return f>0?Math.round((u/f)*100)/100:null;});
            const labels=momAud.map(m=>m.label);
            if(!momFollowerEnd.some(v=>v!==null))return null;
            return(<>
              <div className="sh" style={{marginTop:6}}>Month on Month</div>
              <div className="chart-box"><div style={{fontSize:10,color:"#444",letterSpacing:".1em",textTransform:"uppercase",marginBottom:5}}>Followers — end of month</div><LineChart series={[{data:momFollowerEnd,color:"#f7b500"}]} xLabels={labels} height={110}/></div>
              <div className="chart-box"><div style={{fontSize:10,color:"#444",letterSpacing:".1em",textTransform:"uppercase",marginBottom:5}}>Net Growth (follows − unfollows)</div><LineChart series={[{data:momNet,color:"#25D366"}]} xLabels={labels} height={110}/></div>
              <div className="chart-box"><div style={{fontSize:10,color:"#444",letterSpacing:".1em",textTransform:"uppercase",marginBottom:5}}>Churn Rate</div><LineChart series={[{data:momCR,color:"#E1306C"}]} xLabels={labels} height={110}/></div>
            </>);
          })()}
          {(()=>{
            const years=[nd.getFullYear()-1,nd.getFullYear()].filter(yr=>audienceEntries.some(e=>new Date(e.date+"T00:00:00").getFullYear()===yr));
            if(!years.length)return null;
            const getM=(y,m)=>audienceEntries.filter(e=>{const d=new Date(e.date+"T00:00:00");return d.getFullYear()===y&&d.getMonth()===m;});
            const yrF=years.map(yr=>({year:yr,data:Array.from({length:12},(_,m)=>{const e=getM(yr,m);return e.length?e[e.length-1].followers:null;})}));
            const yrC=years.map(yr=>({year:yr,data:Array.from({length:12},(_,m)=>{const e=getM(yr,m);if(!e.length)return null;const f=e.reduce((s,x)=>s+x.follows,0),u=e.reduce((s,x)=>s+x.unfollows,0);return f>0?Math.round((u/f)*100)/100:null;})}));
            const cols=["#444","#f7b500"],cCols=["#333","#E1306C"];
            return(<>
              <div className="sh" style={{marginTop:6}}>Year on Year</div>
              <div className="chart-box"><div style={{fontSize:10,color:"#444",letterSpacing:".1em",textTransform:"uppercase",marginBottom:5}}>Follower Count by Month</div><LineChart series={yrF.map((yr,i)=>({data:yr.data,color:cols[i]}))} xLabels={MONTHS} height={120}/><div className="legend-row">{yrF.map((yr,i)=><div className="leg-item" key={yr.year}><div className="legend-dot" style={{background:cols[i]}}/><span>{yr.year}</span></div>)}</div></div>
              <div className="chart-box"><div style={{fontSize:10,color:"#444",letterSpacing:".1em",textTransform:"uppercase",marginBottom:5}}>Churn Rate by Month</div><LineChart series={yrC.map((yr,i)=>({data:yr.data,color:cCols[i]}))} xLabels={MONTHS} height={120}/><div className="legend-row">{yrC.map((yr,i)=><div className="leg-item" key={yr.year}><div className="legend-dot" style={{background:cCols[i]}}/><span>{yr.year}</span></div>)}</div></div>
            </>);
          })()}
          {currentMonthAud.length>0&&<div style={{background:"#0d0d0d",border:"1px solid #131313",borderRadius:10,padding:"4px 14px",margin:"14px 0"}}><div style={{fontSize:10,color:"#2e2e2e",letterSpacing:".1em",textTransform:"uppercase",padding:"7px 0 3px"}}>{MONTHS[nd.getMonth()]} stats</div>{[{label:"Total follows",val:totalFollows,color:"#25D366"},{label:"Total unfollows",val:totalUnfollows,color:"#E1306C"},{label:"Net change",val:totalFollows-totalUnfollows,color:totalFollows-totalUnfollows>=0?"#25D366":"#E1306C"}].map(row=><div className="aud-stat-row" key={row.label}><span style={{fontSize:12,color:"#555"}}>{row.label}</span><span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:row.color}}>{row.val>0?"+":""}{row.val}</span></div>)}{audienceEntries.length>0&&(()=>{const last=audienceEntries[audienceEntries.length-1];return<div className="aud-stat-row"><span style={{fontSize:12,color:"#555"}}>Latest count</span><span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:"#f0ede6"}}>{last.followers.toLocaleString("en-IN")}</span></div>;})()}</div>}
          {audienceEntries.length>0&&<div style={{background:"#0d0d0d",border:"1px solid #131313",borderRadius:10,padding:"4px 14px",marginBottom:14}}><div style={{fontSize:10,color:"#2e2e2e",letterSpacing:".1em",textTransform:"uppercase",padding:"7px 0 3px"}}>Daily log</div>{[...audienceEntries].reverse().map(e=>{const cr=e.follows>0?(e.unfollows/e.follows).toFixed(2):"-";const crNum=e.follows>0?e.unfollows/e.follows:null;return(<div className="entry-row" key={e.id}><div style={{flex:1,minWidth:0}}><div style={{fontSize:11,color:"#777",marginBottom:1}}>{e.date}</div><div style={{fontSize:10,color:"#333"}}>👥 {e.followers.toLocaleString("en-IN")} · <span style={{color:"#25D366"}}>+{e.follows}</span> / <span style={{color:"#E1306C"}}>-{e.unfollows}</span>{crNum!==null&&<span style={{color:churnColor(crNum),marginLeft:5}}>churn {cr}</span>}</div></div><button className="del-btn" onClick={()=>setAudienceEntries(x=>x.filter(a=>a.id!==e.id))}>×</button></div>);})}</div>}
          <button className="crbtn" onClick={()=>showCopy(buildAudSummary())}>Copy Audience Summary</button>
        </div>
      )}

      {/* TIME MODAL */}
      {editingTime&&editingTask&&(
        <div className="mov" onClick={()=>setEditingTime(null)}>
          <div className="mod" onClick={e=>e.stopPropagation()}>
            <div className="mt">{editingTask.label}</div>
            <div className="ms">Scheduled {fmt12(editingTask.scheduled)} · What time did you do it?</div>
            <input ref={inputRef} className="ti" placeholder="e.g. 9:45 or 9:45am" value={timeInput} onChange={e=>{setTimeInput(e.target.value);setTimeError("");}} onKeyDown={e=>{if(e.key==="Enter")saveTime(false);if(e.key==="Escape")setEditingTime(null);}}/>
            {timeError&&<div className="terr">{timeError}</div>}
            <div className="mbtns">
              <button className="bnow" onClick={()=>saveTime(true)}>Use Now</button>
              <button className="bsave" onClick={()=>saveTime(false)}>Save</button>
              <button className="bcancel" onClick={()=>setEditingTime(null)}>✕</button>
            </div>
          </div>
        </div>
      )}

      {/* EXPORT MODAL */}
      {showExport&&(
        <div className="mov" onClick={()=>setShowExport(false)}>
          <div className="mod" onClick={e=>e.stopPropagation()}>
            <div className="mt">Export All Data</div>
            <div className="ms">Select all the text below and copy it somewhere safe.</div>
            <textarea readOnly value={exportText} onClick={e=>e.target.select()} style={{flex:1,minHeight:200,background:"#0a0a0a",border:"1px solid #252525",borderRadius:8,color:"#f0ede6",fontFamily:"'DM Mono',monospace",fontSize:11,padding:12,outline:"none",resize:"none",lineHeight:1.5}}/>
            <div className="mbtns"><button className="bnow" onClick={()=>setShowExport(false)}>Done</button></div>
          </div>
        </div>
      )}

      {/* IMPORT MODAL */}
      {showImport&&(
        <div className="mov" onClick={()=>setShowImport(false)}>
          <div className="mod" onClick={e=>e.stopPropagation()}>
            <div className="mt">Import Data</div>
            <div className="ms">Paste your previously exported JSON to restore all data.</div>
            <textarea value={importText} onChange={e=>{setImportText(e.target.value);setImportError("");}} placeholder="Paste export JSON here..." style={{flex:1,minHeight:200,background:"#0a0a0a",border:"1px solid #252525",borderRadius:8,color:"#f0ede6",fontFamily:"'DM Mono',monospace",fontSize:11,padding:12,outline:"none",resize:"none",lineHeight:1.5}}/>
            {importError&&<div className="terr" style={{marginTop:6}}>{importError}</div>}
            <div className="mbtns"><button className="bnow" onClick={doImport}>Import</button><button className="bcancel" onClick={()=>setShowImport(false)}>Cancel</button></div>
          </div>
        </div>
      )}

      {/* COPY/TEXT MODAL */}
      {showTextModal&&(
        <div className="mov" onClick={()=>setShowTextModal(false)}>
          <div className="mod" onClick={e=>e.stopPropagation()}>
            <div className="mt">Summary</div>
            <div className="ms">Tap the text to select all, then copy.</div>
            <textarea readOnly value={textModalContent} onClick={e=>e.target.select()} style={{flex:1,minHeight:220,background:"#0a0a0a",border:"1px solid #252525",borderRadius:8,color:"#f0ede6",fontFamily:"'DM Mono',monospace",fontSize:11,padding:12,outline:"none",resize:"none",lineHeight:1.6}}/>
            <div className="mbtns"><button className="bnow" onClick={()=>setShowTextModal(false)}>Done</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function Root() {
  const [unlocked, setUnlocked] = useState(false);
  useEffect(() => {
    if (localStorage.getItem("iis_auth") === "1") setUnlocked(true);
  }, []);
  if (!unlocked) return <LockScreen onUnlock={() => setUnlocked(true)} />;
  return <App />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
